pluginManagement {
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}
dependencyResolutionManagement {
    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
    repositories {
        google()
        mavenCentral()
        // REQUIRED: This tells Android Studio to look on GitHub (JitPack) for the library
        maven { url = uri("https://jitpack.io") }
    }
}

rootProject.name = "Open Note Scanner"
include(":app")